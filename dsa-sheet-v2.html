<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASH // DSA PLACEMENT SHEET</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#08080f;--bg2:#0d0d18;--bg3:#111120;--bg4:#161628;
  --border:#1a1a2e;--border2:#252540;--border3:#303050;
  --accent:#00ff88;--accent2:#00d4ff;--accent3:#ff6b35;
  --purple:#a78bfa;--pink:#f472b6;
  --red:#ff4757;--yellow:#ffd32a;--green:#00ff88;
  --text:#dde1f0;--text2:#7878a0;--text3:#3a3a5c;
  --easy:#00ff88;--med:#ffd32a;--hard:#ff4757;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 50% -10%,rgba(0,255,136,0.04),transparent);pointer-events:none;z-index:0;}

.z1{position:relative;z-index:1;}

/* HEADER */
header{border-bottom:1px solid var(--border2);background:rgba(8,8,15,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50;}
.header-inner{max-width:1500px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;height:64px;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:0.06em;display:flex;align-items:center;gap:10px;}
.logo-slash{color:var(--accent);margin:0 2px;}
.logo-sub{font-size:10px;color:var(--text2);font-family:'JetBrains Mono',monospace;font-weight:400;letter-spacing:0.12em;background:var(--bg3);border:1px solid var(--border2);padding:2px 8px;border-radius:4px;}
.header-stats{display:flex;gap:10px;align-items:center;}
.stat-pill{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 12px;font-size:11px;}
.stat-num{font-size:17px;font-weight:700;font-family:'Syne',sans-serif;}
.stat-label{color:var(--text2);}
.stat-pill.g .stat-num{color:var(--easy);}
.stat-pill.y .stat-num{color:var(--yellow);}
.stat-pill.r .stat-num{color:var(--hard);}

/* TOOLBAR */
.toolbar{max-width:1500px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
.search-wrap{position:relative;flex:1;min-width:220px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;}
.search-box{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:9px 12px 9px 34px;color:var(--text);font-family:inherit;font-size:12px;outline:none;transition:border-color .2s,box-shadow .2s;}
.search-box::placeholder{color:var(--text3);}
.search-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,255,136,.07);}
select.flt{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-family:inherit;font-size:11px;padding:9px 12px;border-radius:7px;cursor:pointer;outline:none;transition:border-color .2s;}
select.flt:focus{border-color:var(--accent2);color:var(--text);}
.btn-add{background:var(--accent);color:#000;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;padding:9px 18px;border-radius:7px;cursor:pointer;transition:all .2s;letter-spacing:.05em;white-space:nowrap;}
.btn-add:hover{background:#00e87a;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,255,136,.3);}
.progress-bar-global{height:3px;background:var(--border);position:relative;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--purple));transition:width .5s ease;}

/* MAIN */
.main{max-width:1500px;margin:0 auto;padding:20px 24px 80px;}

/* TOPIC BLOCK */
.topic-block{margin-bottom:20px;border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .25s;}
.topic-block:hover{border-color:var(--border2);}
.topic-block.open{border-color:var(--border2);}

.topic-header{background:var(--bg2);padding:13px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .2s;}
.topic-header:hover{background:var(--bg3);}
.th-left{display:flex;align-items:center;gap:14px;}
.topic-icon-wrap{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.topic-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.topic-count{font-size:10px;color:var(--text3);background:var(--bg4);border:1px solid var(--border);padding:2px 8px;border-radius:20px;}
.th-right{display:flex;align-items:center;gap:16px;}
.tp-stats{display:flex;gap:8px;font-size:10px;}
.tp-stat-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:3px;}
.mini-bar{width:80px;height:3px;background:var(--border2);border-radius:2px;overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:2px;transition:width .4s ease;}
.chevron{color:var(--text3);font-size:11px;transition:transform .3s;}
.topic-block.open .chevron{transform:rotate(180deg);}

/* TABLE */
.table-wrap{overflow-x:auto;display:none;}
.topic-block.open .table-wrap{display:block;}
table{width:100%;border-collapse:collapse;}
th{background:var(--bg);padding:9px 14px;font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:64px;z-index:2;}
td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;transition:background .12s;}
tr:last-child td{border-bottom:none;}
tr.prob-row:hover td{background:rgba(255,255,255,.018);}

/* STATUS */
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.07em;cursor:pointer;transition:all .2s;white-space:nowrap;user-select:none;}
.st-unsolved{background:rgba(58,58,92,.25);color:var(--text3);border:1px solid var(--border2);}
.st-attempted{background:rgba(255,211,42,.08);color:var(--yellow);border:1px solid rgba(255,211,42,.25);}
.st-solved{background:rgba(0,255,136,.08);color:var(--green);border:1px solid rgba(0,255,136,.25);}
.status-badge:hover{filter:brightness(1.3);}

/* DIFF */
.diff{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.06em;}
.de{color:var(--easy);background:rgba(0,255,136,.07);}
.dm{color:var(--yellow);background:rgba(255,211,42,.07);}
.dh{color:var(--hard);background:rgba(255,71,87,.07);}

/* PROBLEM LINK */
.prob-link{color:var(--text);text-decoration:none;font-weight:500;transition:color .15s;}
.prob-link:hover{color:var(--accent2);}
.prob-num{color:var(--text3);font-size:10px;width:28px;display:inline-block;flex-shrink:0;}

/* TAGS */
.tags{display:flex;gap:3px;flex-wrap:wrap;}
.ctag{background:rgba(0,212,255,.06);color:var(--accent2);border:1px solid rgba(0,212,255,.12);padding:1px 6px;border-radius:3px;font-size:9px;white-space:nowrap;}
.concept-tag{background:rgba(255,107,53,.06);color:var(--accent3);border:1px solid rgba(255,107,53,.12);padding:1px 6px;border-radius:3px;font-size:9px;white-space:nowrap;}
.none{color:var(--text3);font-size:11px;}

/* NOTES */
.notes-cell{max-width:180px;color:var(--text2);font-size:10px;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
.notes-cell:hover{color:var(--accent2);}

/* ACTION BUTTONS */
.act-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:4px 8px;border-radius:4px;font-size:10px;cursor:pointer;transition:all .2s;font-family:inherit;}
.act-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.act-btn.del:hover{border-color:var(--red);color:var(--red);}
.act-btns{display:flex;gap:4px;}

/* EMPTY */
.empty-row td{text-align:center;padding:24px;color:var(--text3);font-size:11px;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .22s;}
.overlay.on{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:540px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:28px;transform:translateY(16px);transition:transform .22s;box-shadow:0 32px 100px rgba(0,0,0,.7);}
.overlay.on .modal{transform:translateY(0);}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:22px;color:var(--accent);display:flex;align-items:center;gap:9px;}
.form-grid{display:grid;gap:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
label{display:flex;flex-direction:column;gap:5px;font-size:10px;color:var(--text2);letter-spacing:.07em;text-transform:uppercase;font-weight:600;}
input[type=text],input[type=url],textarea,select.fs{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:inherit;font-size:12px;padding:9px 11px;border-radius:6px;outline:none;transition:border-color .18s;width:100%;}
input:focus,textarea:focus,select.fs:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:68px;line-height:1.5;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:22px;}
.btn-cancel{background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:'Syne',sans-serif;font-weight:600;font-size:12px;padding:8px 18px;border-radius:6px;cursor:pointer;transition:all .2s;}
.btn-cancel:hover{border-color:var(--text2);color:var(--text);}
.btn-save{background:var(--accent);color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;padding:8px 22px;border-radius:6px;border:none;cursor:pointer;transition:all .2s;}
.btn-save:hover{background:#00e07a;}
.notes-full{font-size:13px;color:var(--text);line-height:1.75;white-space:pre-wrap;}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:11px;padding:9px 16px;border-radius:6px;z-index:200;transform:translateY(14px);opacity:0;transition:all .25s;pointer-events:none;display:flex;align-items:center;gap:8px;}
.toast.on{transform:translateY(0);opacity:1;}
.toast-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--border3);}

@media(max-width:768px){
  .header-stats{gap:6px;}.stat-pill{padding:5px 8px;}.form-row{grid-template-columns:1fr;}
  .tp-stats{display:none;}.mini-bar{display:none;}
}
</style>
</head>
<body>

<header>
  <div class="header-inner z1">
    <div class="logo">
      ASH<span class="logo-slash">//</span>DSA
      <span class="logo-sub">PLACEMENT SHEET</span>
    </div>
    <div class="header-stats">
      <div class="stat-pill g"><span class="stat-num" id="s-solved">0</span><span class="stat-label">Solved</span></div>
      <div class="stat-pill y"><span class="stat-num" id="s-attempted">0</span><span class="stat-label">Tried</span></div>
      <div class="stat-pill r"><span class="stat-num" id="s-unsolved">0</span><span class="stat-label">Todo</span></div>
      <div class="stat-pill"><span class="stat-num" id="s-total">0</span><span class="stat-label">Total</span></div>
    </div>
  </div>
  <div class="progress-bar-global z1"><div class="progress-bar-fill" id="globalBar" style="width:0%"></div></div>
</header>

<div class="toolbar z1">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-box" type="text" id="searchInput" placeholder="Search problems, companies, concepts... (Ctrl+K)"/>
  </div>
  <select class="flt" id="filterStatus" onchange="render()">
    <option value="">All Status</option>
    <option value="unsolved">Unsolved</option>
    <option value="attempted">Attempted</option>
    <option value="solved">Solved</option>
  </select>
  <select class="flt" id="filterDiff" onchange="render()">
    <option value="">All Difficulty</option>
    <option value="Easy">Easy</option>
    <option value="Medium">Medium</option>
    <option value="Hard">Hard</option>
  </select>
  <select class="flt" id="filterTopic" onchange="render()">
    <option value="">All Topics</option>
  </select>
  <button class="btn-add" onclick="openAdd()">+ ADD PROBLEM</button>
</div>

<div class="main z1" id="main"></div>

<!-- FORM MODAL -->
<div class="overlay" id="formOverlay">
  <div class="modal">
    <div class="modal-title" id="formTitle">⚡ ADD PROBLEM</div>
    <div class="form-grid">
      <label>Problem Name *<input type="text" id="f-name" placeholder="Two Sum"/></label>
      <label>Problem URL<input type="url" id="f-url" placeholder="https://leetcode.com/problems/..."/></label>
      <div class="form-row">
        <label>Difficulty
          <select class="fs" id="f-diff"><option>Easy</option><option selected>Medium</option><option>Hard</option></select>
        </label>
        <label>Status
          <select class="fs" id="f-status">
            <option value="unsolved">Unsolved</option>
            <option value="attempted">Attempted</option>
            <option value="solved">Solved</option>
          </select>
        </label>
      </div>
      <label>Topic *
        <select class="fs" id="f-topic"></select>
      </label>
      <label>Concept / Pattern<input type="text" id="f-concept" placeholder="e.g. Kadane's Algorithm, Two Pointers"/></label>
      <label>Companies (comma separated)<input type="text" id="f-companies" placeholder="Amazon, Google, Microsoft"/></label>
      <label>Notes / Approach<textarea id="f-notes" placeholder="Key insight, time complexity, edge cases..."></textarea></label>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeOverlay('formOverlay')">Cancel</button>
      <button class="btn-save" onclick="saveProblem()">SAVE PROBLEM</button>
    </div>
  </div>
</div>

<!-- NOTES MODAL -->
<div class="overlay" id="notesOverlay">
  <div class="modal" style="max-width:480px">
    <div class="modal-title" id="notesTitle">📝 NOTES</div>
    <div class="notes-full" id="notesContent"></div>
    <div class="modal-actions" style="margin-top:18px">
      <button class="btn-save" onclick="closeOverlay('notesOverlay')">CLOSE</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span class="toast-dot"></span><span id="toast-msg"></span></div>

<script>
// ─── SEED DATA ────────────────────────────────────────────────────────────────
const SEED = [
// ARRAYS
{id:'a001',name:'Two Sum',url:'https://leetcode.com/problems/two-sum/',topic:'Arrays',diff:'Easy',status:'unsolved',concept:'Hash Map',companies:['Amazon','Google','Microsoft','Adobe','Facebook','Apple'],notes:''},

{id:'a024',name:'Longest Consecutive Sequence',url:'https://leetcode.com/problems/longest-consecutive-sequence/',topic:'Arrays',diff:'Medium',status:'unsolved',concept:'Hash Set O(n)',companies:['Amazon','Google','Facebook','Airbnb'],notes:''},
{id:'a025',name:'First Missing Positive',url:'https://leetcode.com/problems/first-missing-positive/',topic:'Arrays',diff:'Hard',status:'unsolved',concept:'Index as Hash / Cycle Sort',companies:['Amazon','Google','Microsoft'],notes:''},
{id:'a026',name:'Next Permutation',url:'https://leetcode.com/problems/next-permutation/',topic:'Arrays',diff:'Medium',status:'unsolved',concept:'Suffix Scan + Swap + Reverse',companies:['Amazon','Microsoft','Google'],notes:''},
{id:'a027',name:'Jump Game',url:'https://leetcode.com/problems/jump-game/',topic:'Arrays',diff:'Medium',status:'unsolved',concept:'Greedy Max Reach',companies:['Amazon','Google','Adobe'],notes:''},
{id:'a028',name:'Jump Game II',url:'https://leetcode.com/problems/jump-game-ii/',topic:'Arrays',diff:'Medium',status:'unsolved',concept:'Greedy BFS Levels',companies:['Amazon','Google'],notes:''},

const STATUS_CYCLE = {unsolved:'attempted',attempted:'solved',solved:'unsolved'};
const STATUS_LABEL = {unsolved:'○ TODO',attempted:'~ TRIED',solved:'✓ SOLVED'};

// ─── STATE ────────────────────────────────────────────────────────────────────
let db = {problems:[],openTopics:{},userStatus:{},userNotes:{}};
let editId = null;

function load() {
  try { const r=localStorage.getItem(SK); if(r) db=JSON.parse(r); } catch(e){}
  if(!db.problems||db.problems.length===0) { db.problems=SEED.map(p=>({...p})); }
  if(!db.openTopics) db.openTopics={};
  if(!db.userStatus) db.userStatus={};
  if(!db.userNotes) db.userNotes={};
  // Sync seed updates — if SEED has more problems, append missing ones
  const ids = new Set(db.problems.map(p=>p.id));
  SEED.forEach(s=>{ if(!ids.has(s.id)) db.problems.push({...s}); });
  populateFilters();
}
function save() { try{localStorage.setItem(SK,JSON.stringify(db));}catch(e){} }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }

function populateFilters() {
  const sel = document.getElementById('filterTopic');
  TOPIC_ORDER.forEach(t => {
    const o=document.createElement('option'); o.value=t; o.textContent=t; sel.appendChild(o);
  });
  const fsel = document.getElementById('f-topic');
  TOPIC_ORDER.forEach(t => {
    const o=document.createElement('option'); o.value=t; o.textContent=t; fsel.appendChild(o);
  });
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function getFiltered() {
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  const fs=document.getElementById('filterStatus').value;
  const fd=document.getElementById('filterDiff').value;
  const ft=document.getElementById('filterTopic').value;
  return db.problems.filter(p=>{
    if(ft && p.topic!==ft) return false;
    if(fs && p.status!==fs) return false;
    if(fd && p.diff!==fd) return false;
    if(q){
      const hay=[p.name,p.concept||'',p.topic,(p.companies||[]).join(' '),(p.notes||'')].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

function render() {
  const filtered = getFiltered();
  const byTopic = {};
  TOPIC_ORDER.forEach(t=>byTopic[t]=[]);
  filtered.forEach(p=>{ if(!byTopic[p.topic]) byTopic[p.topic]=[]; byTopic[p.topic].push(p); });

  const all = db.problems;
  const solved = all.filter(p=>p.status==='solved').length;
  const attempted = all.filter(p=>p.status==='attempted').length;
  document.getElementById('s-solved').textContent=solved;
  document.getElementById('s-attempted').textContent=attempted;
  document.getElementById('s-unsolved').textContent=all.length-solved-attempted;
  document.getElementById('s-total').textContent=all.length;
  document.getElementById('globalBar').style.width=all.length?(solved/all.length*100)+'%':'0%';

  const searching = document.getElementById('searchInput').value||document.getElementById('filterStatus').value||document.getElementById('filterDiff').value||document.getElementById('filterTopic').value;

  let html='';
  TOPIC_ORDER.forEach(topic=>{
    const probs=byTopic[topic]||[];
    const allInTopic=db.problems.filter(p=>p.topic===topic);
    if(allInTopic.length===0) return;
    if(searching && probs.length===0) return;

    const s=TOPIC_STYLE[topic]||{icon:'◆',color:'#888',bg:'rgba(136,136,136,0.1)'};
    const isOpen=db.openTopics[topic];
    const topSolved=allInTopic.filter(p=>p.status==='solved').length;
    const pct=allInTopic.length?Math.round(topSolved/allInTopic.length*100):0;
    const topAttempted=allInTopic.filter(p=>p.status==='attempted').length;
    const topId='tp_'+topic.replace(/[\s&]/g,'_');

    html+=`<div class="topic-block${isOpen?' open':''}" id="${topId}">
      <div class="topic-header" onclick="toggleTopic('${topic}')">
        <div class="th-left">
          <div class="topic-icon-wrap" style="background:${s.bg};color:${s.color}">${s.icon}</div>
          <span class="topic-name" style="color:${s.color}">${topic}</span>
          <span class="topic-count">${allInTopic.length}</span>
        </div>
        <div class="th-right">
          <div class="tp-stats">
            <span><span class="tp-stat-dot" style="background:var(--easy)"></span>${topSolved}</span>
            <span><span class="tp-stat-dot" style="background:var(--yellow)"></span>${topAttempted}</span>
            <span style="color:var(--text3)">${pct}%</span>
          </div>
          <div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%;background:${s.color}"></div></div>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="table-wrap">
        <table><thead><tr>
          <th>#</th><th>PROBLEM</th><th>DIFF</th><th>CONCEPT</th><th>COMPANIES</th><th>STATUS</th><th>NOTES</th><th></th>
        </tr></thead><tbody>`;

    if(probs.length===0){
      html+=`<tr class="empty-row"><td colspan="8">No problems match filters in this topic.</td></tr>`;
    } else {
      probs.forEach((p,i)=>{
        const dc=p.diff==='Easy'?'de':p.diff==='Hard'?'dh':'dm';
        const cos=(p.companies||[]).map(c=>`<span class="ctag">${c}</span>`).join('');
        const noteText=p.notes?`<span class="notes-cell" onclick="openNotes('${p.id}')">${p.notes.slice(0,38)}${p.notes.length>38?'…':''}</span>`:`<span class="none">—</span>`;
        html+=`<tr class="prob-row">
          <td style="color:var(--text3);font-size:10px;width:32px">${i+1}</td>
          <td><a class="prob-link" href="${p.url||'#'}" target="_blank" rel="noopener">${p.name}</a></td>
          <td><span class="diff ${dc}">${p.diff}</span></td>
          <td>${p.concept?`<span class="concept-tag">${p.concept}</span>`:'<span class="none">—</span>'}</td>
          <td><div class="tags">${cos||'<span class="none">—</span>'}</div></td>
          <td><span class="status-badge st-${p.status}" onclick="cycleStatus('${p.id}')">${STATUS_LABEL[p.status]}</span></td>
          <td>${noteText}</td>
          <td><div class="act-btns">
            <button class="act-btn" onclick="openEdit('${p.id}')">✎</button>
            <button class="act-btn del" onclick="del('${p.id}')">✕</button>
          </div></td>
        </tr>`;
      });
    }
    html+=`</tbody></table></div></div>`;
  });

  document.getElementById('main').innerHTML=html;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function toggleTopic(t) { db.openTopics[t]=!db.openTopics[t]; save(); render(); }

function cycleStatus(id) {
  const p=db.problems.find(x=>x.id===id); if(!p) return;
  p.status=STATUS_CYCLE[p.status];
  save(); render();
  toast('→ '+STATUS_LABEL[p.status]+': '+p.name);
}

function del(id) {
  const p=db.problems.find(x=>x.id===id); if(!p) return;
  if(!confirm(`Delete "${p.name}"?`)) return;
  db.problems=db.problems.filter(x=>x.id!==id);
  save(); render(); toast('Deleted.');
}

function openAdd() {
  editId=null;
  document.getElementById('formTitle').textContent='⚡ ADD PROBLEM';
  ['f-name','f-url','f-concept','f-companies','f-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-diff').value='Medium';
  document.getElementById('f-status').value='unsolved';
  document.getElementById('f-topic').value='Arrays';
  document.getElementById('formOverlay').classList.add('on');
  setTimeout(()=>document.getElementById('f-name').focus(),120);
}

function openEdit(id) {
  const p=db.problems.find(x=>x.id===id); if(!p) return;
  editId=id;
  document.getElementById('formTitle').textContent='✎ EDIT PROBLEM';
  document.getElementById('f-name').value=p.name;
  document.getElementById('f-url').value=p.url||'';
  document.getElementById('f-diff').value=p.diff;
  document.getElementById('f-status').value=p.status;
  document.getElementById('f-topic').value=p.topic;
  document.getElementById('f-concept').value=p.concept||'';
  document.getElementById('f-companies').value=(p.companies||[]).join(', ');
  document.getElementById('f-notes').value=p.notes||'';
  document.getElementById('formOverlay').classList.add('on');
}

function saveProblem() {
  const name=document.getElementById('f-name').value.trim();
  if(!name){toast('Name is required!');return;}
  const prob={
    id:editId||uid(),
    name,
    url:document.getElementById('f-url').value.trim(),
    diff:document.getElementById('f-diff').value,
    status:document.getElementById('f-status').value,
    topic:document.getElementById('f-topic').value,
    concept:document.getElementById('f-concept').value.trim(),
    companies:document.getElementById('f-companies').value.split(',').map(s=>s.trim()).filter(Boolean),
    notes:document.getElementById('f-notes').value.trim(),
  };
  if(editId){
    const i=db.problems.findIndex(x=>x.id===editId);
    if(i!==-1) db.problems[i]=prob;
    toast('Updated: '+prob.name);
  } else {
    db.problems.push(prob);
    db.openTopics[prob.topic]=true;
    toast('Added: '+prob.name);
  }
  save(); closeOverlay('formOverlay'); render();
}

function openNotes(id) {
  const p=db.problems.find(x=>x.id===id); if(!p||!p.notes) return;
  document.getElementById('notesTitle').textContent='📝 '+p.name;
  document.getElementById('notesContent').textContent=p.notes;
  document.getElementById('notesOverlay').classList.add('on');
}

function closeOverlay(id) { document.getElementById(id).classList.remove('on'); }

function toast(msg) {
  document.getElementById('toast-msg').textContent=msg;
  const t=document.getElementById('toast');
  t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2400);
}

// ─── EVENT LISTENERS ──────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input',render);
document.querySelectorAll('.overlay').forEach(el=>el.addEventListener('click',e=>{ if(e.target===el) el.classList.remove('on'); }));
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') document.querySelectorAll('.overlay').forEach(m=>m.classList.remove('on'));
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus();}
});

// ─── INIT ────────────────────────────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
